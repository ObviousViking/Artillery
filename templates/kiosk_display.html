<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="{{ url_for('kiosk_manifest', kslug=kslug) }}">
<title>{{ settings.name or kslug }} — Kiosk</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    cursor: none;
    background: #000;
}
#stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
}

/* ── Slide base ─────────────────────────────────────────────────── */
.k-slide {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
}
.k-slide img {
    position: relative; z-index: 1;
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    display: block;
}
/* Background blur layer */
.k-bg {
    position: absolute; inset: -30px;
    background-size: cover;
    background-position: center;
    filter: blur(18px);
    opacity: 0;
    z-index: 0;
    transition: opacity 0.3s;
}

/* ── Fit modes ──────────────────────────────────────────────────── */
body.fit-cover  .k-slide img { object-fit: cover; width: 100%; height: 100%; max-width: none; max-height: none; }
body.fit-center .k-slide img { object-fit: none; max-width: none; max-height: none; }

/* ── Backgrounds ────────────────────────────────────────────────── */
body.bg-white               { background: #fff; }
body.bg-blur .k-slide .k-bg { opacity: 0.75; }

/* ── Transitions ────────────────────────────────────────────────── */
/* Fade (default) */
.k-slide {
    opacity: 0;
    transition: opacity var(--trans-speed, 0.9s) ease;
}
.k-slide.visible { opacity: 1; }

/* Cut */
body.trans-cut .k-slide            { transition: none; }
body.trans-cut .k-slide.visible    { opacity: 1; }

/* Slide */
body.trans-slide .k-slide          { opacity: 1; transform: translateX(100%); transition: transform var(--trans-speed, 0.9s) ease; }
body.trans-slide .k-slide.visible  { transform: translateX(0); }
body.trans-slide .k-slide.leaving  { transform: translateX(-100%); }

/* ── Ken Burns ──────────────────────────────────────────────────── */
@keyframes kenburns-a { from { transform: scale(1.0) translate(0,    0);    } to { transform: scale(1.12) translate(-2%, -1.5%); } }
@keyframes kenburns-b { from { transform: scale(1.0) translate(0,    0);    } to { transform: scale(1.12) translate( 2%, -1.5%); } }
@keyframes kenburns-c { from { transform: scale(1.0) translate(0,    0);    } to { transform: scale(1.12) translate(-1%,  1.5%); } }
@keyframes kenburns-d { from { transform: scale(1.08) translate(-2%, -1%);  } to { transform: scale(1.0)  translate(0,   0);    } }

/* ── Controls ───────────────────────────────────────────────────── */
#controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 1rem 1.5rem;
    background: linear-gradient(transparent, rgba(0,0,0,0.75));
    display: flex; align-items: center; gap: 1rem;
    opacity: 0;
    transition: opacity 0.3s ease;
    color: #fff;
    font-family: system-ui, sans-serif;
    z-index: 100;
}
#controls.visible { opacity: 1; }
.k-name { font-size: 0.85rem; opacity: 0.7; flex-shrink: 0; }
.k-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff; border-radius: 5px;
    padding: 0.3rem 0.8rem; font-size: 0.8rem;
    cursor: pointer; flex-shrink: 0;
}
.k-btn:hover { background: rgba(255,255,255,0.28); }
.k-progress {
    flex: 1;
    height: 2px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    overflow: hidden;
    min-width: 40px;
}
.k-progress-bar {
    height: 100%;
    background: #f97316;
    width: 0%;
    transition: width linear;
}

/* ── Clock ──────────────────────────────────────────────────────── */
#clock {
    position: fixed; top: 1.4rem; right: 2rem;
    font-family: system-ui, sans-serif;
    font-size: 2.4rem; font-weight: 200;
    color: rgba(255,255,255,0.88);
    text-shadow: 0 1px 6px rgba(0,0,0,0.55);
    letter-spacing: 0.04em;
    z-index: 90;
    pointer-events: none;
    display: none;
}

/* ── No images ──────────────────────────────────────────────────── */
#noImages {
    color: #fff;
    font-family: system-ui, sans-serif;
    text-align: center;
    opacity: 0.6;
}
</style>
</head>
<body class="fit-{{ settings.get('fit','contain') }} bg-{{ settings.get('background','black') }} trans-{{ settings.get('transition','fade') }}">

<div id="stage">
    <div id="noImages" style="display:none;">
        <p style="font-size:1.2rem;margin-bottom:0.5rem;">No images in this kiosk.</p>
        <p style="font-size:0.85rem;">Add images from the <a href="{{ url_for('kiosk_manage', kslug=kslug) }}" style="color:#f97316;">management page</a>.</p>
    </div>
</div>

<div id="clock"></div>

<div id="controls">
    <span class="k-name">{{ settings.name or kslug }}</span>
    <button class="k-btn" id="btnPrev">&#8592;</button>
    <button class="k-btn" id="btnNext">&#8594;</button>
    <div class="k-progress"><div class="k-progress-bar" id="kBar"></div></div>
    <button class="k-btn" id="btnPause">&#9646;&#9646; Pause</button>
    <button class="k-btn" id="btnFs">&#x26F6; Fullscreen</button>
    <a class="k-btn" href="{{ url_for('kiosk_manage', kslug=kslug) }}" style="text-decoration:none;">&#8943; Manage</a>
</div>

<script>
(function() {
    var API          = '{{ url_for("kiosk_images_api", kslug=kslug) }}';
    var TRANSITION   = '{{ settings.get("transition", "fade") }}';
    var TRANS_SPEED  = {{ settings.get("trans_speed", 0.9) }};
    var KEN_BURNS    = {{ 'true' if settings.get('ken_burns') == '1' else 'false' }};
    var SHOW_CLOCK   = {{ 'true' if settings.get('show_clock') == '1' else 'false' }};
    var BACKGROUND   = '{{ settings.get("background", "black") }}';

    // Apply transition speed CSS variable
    document.documentElement.style.setProperty('--trans-speed', TRANS_SPEED + 's');

    var stage        = document.getElementById('stage');
    var controls     = document.getElementById('controls');
    var kBar         = document.getElementById('kBar');
    var btnPrev      = document.getElementById('btnPrev');
    var btnNext      = document.getElementById('btnNext');
    var btnPause     = document.getElementById('btnPause');
    var btnFs        = document.getElementById('btnFs');
    var noImages     = document.getElementById('noImages');
    var clockEl      = document.getElementById('clock');

    var images       = [];
    var idx          = 0;
    var interval     = 10;
    var order        = 'random';
    var paused       = false;
    var slides       = [];
    var curSlide     = null;
    var timer        = null;
    var controlsTimer = null;
    var kbVariants   = ['kenburns-a', 'kenburns-b', 'kenburns-c', 'kenburns-d'];

    // ── Clock ───────────────────────────────────────────────────────
    if (SHOW_CLOCK) {
        clockEl.style.display = '';
        function updateClock() {
            var now = new Date();
            var h = now.getHours().toString().padStart(2, '0');
            var m = now.getMinutes().toString().padStart(2, '0');
            clockEl.textContent = h + ':' + m;
        }
        updateClock();
        setInterval(updateClock, 15000);
    }

    // ── Fullscreen ──────────────────────────────────────────────────
    function goFullscreen() {
        var el = document.documentElement;
        try {
            if (el.requestFullscreen)       el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            else if (el.mozRequestFullScreen)    el.mozRequestFullScreen();
        } catch(e) {}
    }
    btnFs.addEventListener('click', function() {
        if (document.fullscreenElement) document.exitFullscreen();
        else goFullscreen();
    });

    // ── Show controls on mouse move ─────────────────────────────────
    document.addEventListener('mousemove', function() {
        document.body.style.cursor = 'default';
        controls.classList.add('visible');
        clearTimeout(controlsTimer);
        controlsTimer = setTimeout(function() {
            controls.classList.remove('visible');
            document.body.style.cursor = 'none';
        }, 3000);
    });

    // ── Slide factory ───────────────────────────────────────────────
    function makeSlide(img) {
        var div = document.createElement('div');
        div.className = 'k-slide';

        // Blur background layer (shown when background=blur)
        if (BACKGROUND === 'blur') {
            var bg = document.createElement('div');
            bg.className = 'k-bg';
            bg.style.backgroundImage = 'url(' + img.url + ')';
            div.appendChild(bg);
        }

        var el = document.createElement('img');
        el.src = img.url;
        el.alt = img.name;
        div.appendChild(el);
        stage.appendChild(div);
        return div;
    }

    function preload(imgUrl) {
        var i = new Image();
        i.src = imgUrl;
    }

    // ── Ken Burns ───────────────────────────────────────────────────
    function applyKenBurns(slide) {
        var img = slide.querySelector('img');
        if (!img) return;
        var variant = kbVariants[Math.floor(Math.random() * kbVariants.length)];
        img.style.animation = 'none';
        void img.offsetWidth; // force reflow to restart animation
        img.style.animation = variant + ' ' + interval + 's ease-in-out forwards';
    }

    // ── Show slide ──────────────────────────────────────────────────
    function showSlide(i) {
        if (!images.length) return;
        i = ((i % images.length) + images.length) % images.length;
        idx = i;

        while (slides.length < images.length) { slides.push(null); }
        if (!slides[i]) slides[i] = makeSlide(images[i]);

        var incoming = slides[i];
        var outgoing = curSlide;

        if (TRANSITION === 'slide' && outgoing) {
            outgoing.classList.add('leaving');
            var gone = outgoing;
            setTimeout(function() { gone.classList.remove('visible', 'leaving'); }, TRANS_SPEED * 1000);
        } else if (outgoing) {
            outgoing.classList.remove('visible');
        }

        incoming.classList.add('visible');
        curSlide = incoming;

        if (KEN_BURNS) applyKenBurns(incoming);

        // Preload next
        var next = (i + 1) % images.length;
        if (!slides[next]) slides[next] = makeSlide(images[next]);
        if (images[next]) preload(images[next].url);

        startBar();
    }

    // ── Timer & progress bar ────────────────────────────────────────
    function nextIdx() {
        if (order === 'random') {
            if (images.length <= 1) return 0;
            var n;
            do { n = Math.floor(Math.random() * images.length); } while (n === idx);
            return n;
        }
        return (idx + 1) % images.length;
    }

    function advance() { showSlide(nextIdx()); }

    function startTimer() {
        clearTimeout(timer);
        if (!paused) {
            timer = setTimeout(function() { advance(); startTimer(); }, interval * 1000);
        }
    }

    function startBar() {
        kBar.style.transition = 'none';
        kBar.style.width = '0%';
        if (paused) return;
        requestAnimationFrame(function() {
            requestAnimationFrame(function() {
                kBar.style.transition = 'width ' + interval + 's linear';
                kBar.style.width = '100%';
            });
        });
    }

    // ── Controls ────────────────────────────────────────────────────
    btnPrev.addEventListener('click', function() {
        clearTimeout(timer);
        showSlide(idx - 1);
        if (!paused) startTimer();
    });
    btnNext.addEventListener('click', function() {
        clearTimeout(timer);
        advance();
        if (!paused) startTimer();
    });
    btnPause.addEventListener('click', function() {
        paused = !paused;
        btnPause.textContent = paused ? '▶ Play' : '⏸ Pause';
        if (paused) {
            clearTimeout(timer);
            kBar.style.transition = 'none';
            kBar.style.width = '0%';
        } else {
            startTimer();
            startBar();
        }
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === ' ') { btnNext.click(); }
        else if (e.key === 'ArrowLeft')               { btnPrev.click(); }
        else if (e.key === 'p' || e.key === 'P')      { btnPause.click(); }
        else if (e.key === 'f' || e.key === 'F')      { btnFs.click(); }
    });

    // ── Load images ─────────────────────────────────────────────────
    fetch(API)
        .then(function(r) { return r.json(); })
        .then(function(d) {
            interval = d.interval || 10;
            order    = d.order    || 'random';
            images   = d.images   || [];
            if (order === 'random') {
                images.sort(function() { return Math.random() - 0.5; });
            }
            if (images.length) {
                showSlide(0);
                startTimer();
            } else {
                noImages.style.display = '';
            }
        })
        .catch(function() {
            noImages.style.display = '';
        });
})();
</script>
</body>
</html>
