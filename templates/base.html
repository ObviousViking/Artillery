<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Artillery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}" />

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <!-- Your dark theme styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />

    <style>
    /* ── Toast notifications ──────────────────────────────────────────── */
    #toast-wrap {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        z-index: 1100;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        pointer-events: none;
        max-width: 380px;
    }
    .t-toast {
        pointer-events: auto;
        padding: 0.7rem 1.1rem;
        border-radius: 9px;
        font-size: 0.875rem;
        font-weight: 500;
        box-shadow: 0 4px 20px rgba(0,0,0,0.28);
        opacity: 1;
        transform: translateY(0);
        transition: opacity 0.35s ease, transform 0.35s ease;
        color: #fff;
        word-break: break-word;
        line-height: 1.4;
    }
    .t-toast.success { background: #16a34a; }
    .t-toast.danger  { background: #dc2626; }
    .t-toast.info    { background: #2563eb; }
    .t-toast.warning { background: #d97706; }
    .t-toast.vanish  { opacity: 0; transform: translateY(6px); pointer-events: none; }
    </style>

    <!-- Theme initialization (must run before page renders) -->
    <script>
        (function() {
            const THEME_KEY = 'artillery-theme';
            const DARK_THEME = 'dark';
            const LIGHT_THEME = 'light';

            function getSystemPreference() {
                return window.matchMedia('(prefers-color-scheme: dark)').matches ? DARK_THEME : LIGHT_THEME;
            }

            function getCurrentTheme() {
                const stored = localStorage.getItem(THEME_KEY);
                if (stored) return stored;
                return getSystemPreference();
            }

            const theme = getCurrentTheme();
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-artillery fixed-top mb-4">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="{{ url_for('home') }}">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Artillery logo"
                    style="height:32px;width:32px;object-fit:contain;margin-right:0.5rem;" />
                <span>ARTILLERY</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'home' %}active{% endif %}"
                            href="{{ url_for('home') }}">
                            Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'tasks' %}active{% endif %}"
                            href="{{ url_for('tasks') }}">
                            Tasks
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'config_page' %}active{% endif %}"
                            href="{{ url_for('config_page') }}">
                            Config
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="https://github.com/obviousviking/artillery" target="_blank" rel="noopener noreferrer">
                            GitHub <span id="ghStars" style="font-size:0.78em;opacity:0.7;letter-spacing:0.02em;"></span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <label class="theme-toggle-wrapper" title="Toggle dark/light mode">
                            <input type="checkbox" id="themeToggle" class="theme-toggle-checkbox" />
                            <div class="theme-toggle-slider"></div>
                        </label>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div id="toast-wrap">
        {% for category, message in messages %}
        <div class="t-toast {% if category == 'error' %}danger{% elif category == 'success' %}success{% elif category == 'warning' %}warning{% else %}info{% endif %}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <main class="{% block main_class %}container mb-5{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Dark mode toggle script -->
    <script>
        const THEME_KEY = 'artillery-theme';
        const DARK_THEME = 'dark';
        const LIGHT_THEME = 'light';

        function getCurrentTheme() {
            const stored = localStorage.getItem(THEME_KEY);
            if (stored) return stored;
            const systemPref = window.matchMedia('(prefers-color-scheme: dark)').matches ? DARK_THEME : LIGHT_THEME;
            return systemPref;
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem(THEME_KEY, theme);
            updateToggleCheckbox(theme);
        }

        function updateToggleCheckbox(theme) {
            const checkbox = document.getElementById('themeToggle');
            if (checkbox) {
                checkbox.checked = theme === LIGHT_THEME;
            }
        }

        function toggleTheme() {
            const current = getCurrentTheme();
            const next = current === DARK_THEME ? LIGHT_THEME : DARK_THEME;
            applyTheme(next);
        }

        document.addEventListener('DOMContentLoaded', function() {
            const theme = getCurrentTheme();
            updateToggleCheckbox(theme);

            const toggle = document.getElementById('themeToggle');
            if (toggle) {
                toggle.addEventListener('change', toggleTheme);
            }

            document.querySelectorAll('.t-toast').forEach(function(el) {
                setTimeout(function() {
                    el.classList.add('vanish');
                    setTimeout(function() { el.remove(); }, 380);
                }, 3000);
            });
        });
    </script>

    <!-- GitHub star count (cached 1 h in localStorage to stay well under API rate limit) -->
    <script>
    (function () {
        var CACHE_KEY = 'artillery-gh-stars';
        var TTL = 3600000;
        function show(n) {
            var el = document.getElementById('ghStars');
            if (el && n) el.textContent = '★ ' + Number(n).toLocaleString();
        }
        try {
            var hit = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
            if (hit && Date.now() - hit.ts < TTL) { show(hit.n); return; }
        } catch (e) {}
        fetch('https://api.github.com/repos/obviousviking/artillery')
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (d) {
                if (!d || d.stargazers_count === undefined) return;
                try { localStorage.setItem(CACHE_KEY, JSON.stringify({n: d.stargazers_count, ts: Date.now()})); } catch (e) {}
                show(d.stargazers_count);
            })
            .catch(function () {});
    })();
    </script>

    <!-- Swiper JS (before closing body) -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const wall = document.querySelector('.media-wall');
            const loader = document.getElementById('media-wall-loader');

            if (!wall) {
                return; // no wall on this page
            }

            const images = wall.querySelectorAll('img.media-img');

            if (!images.length) {
                wall.classList.add('media-wall-ready');
                if (loader) {
                    loader.classList.add('media-wall-loader-hidden');
                }
                return;
            }

            let loaded = 0;
            const total = images.length;

            function tryShowWall() {
                if (loaded >= total) {
                    wall.classList.add('media-wall-ready');
                    if (loader) {
                        loader.classList.add('media-wall-loader-hidden');
                    }
                }
            }

            images.forEach(function (img) {
                if (img.complete) {
                    loaded++;
                    tryShowWall();
                    return;
                }

                img.addEventListener('load', function () {
                    loaded++;
                    tryShowWall();
                });

                img.addEventListener('error', function () {
                    loaded++;
                    tryShowWall();
                });
            });

            setTimeout(function () {
                wall.classList.add('media-wall-ready');
                if (loader) {
                    loader.classList.add('media-wall-loader-hidden');
                }
            }, 5000);
        });
    </script>
</body>
</html>
